name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  style:
    name: Style Check
    uses: ./.github/workflows/_style.yml

  audit:
    name: Dependency Audit
    uses: ./.github/workflows/_audit.yml

  sast:
    name: SAST Security Scan
    uses: ./.github/workflows/_sast.yml

  test:
    name: Test & Coverage
    uses: ./.github/workflows/_test.yml
    needs: [style, audit, sast]

  pipeline-success:
    name: CI Pipeline Success
    runs-on: ubuntu-latest
    needs: [style, audit, sast, test]
    if: success()
    steps:
      - name: All checks passed
        run: |
          echo "✅ All CI checks passed successfully!"
          echo "Style: ✅"
          echo "Dependency Audit: ✅"
          echo "SAST: ✅"
          echo "Tests & Coverage: ✅"
