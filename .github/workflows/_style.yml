name: Style Check

on:
  workflow_call:

jobs:
  ruff:
    name: Ruff Linting & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.2"
          python-version: "3.11"

      - name: Run Ruff linter
        run: uvx ruff check . --output-format=github

      - name: Run Ruff formatter
        run: uvx ruff format --check --diff .

  mypy:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.2"
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy api/ ingestion/ --strict