# Promtail Configuration for SentinelAI
# Ships Docker container logs to Loki with structured labels

server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Tracks position in log files to avoid re-sending on restart
positions:
  filename: /tmp/positions.yaml

# Loki endpoint to push logs to
clients:
  - url: http://loki:3100/loki/api/v1/push

# Scrape Docker container logs
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=sentinel-ai"]

    relabel_configs:
      # Extract container name (remove leading slash)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Extract service name from Docker Compose label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Add stream type (stdout/stderr)
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

    pipeline_stages:
      # Parse JSON logs from Uvicorn/FastAPI
      - json:
          expressions:
            level: level
            message: message
            timestamp: time
            logger: name

      # If not JSON, treat whole line as message
      - match:
          selector: '{service="backend"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) (?P<level>\w+)\s+(?P<message>.*)$'
            - labels:
                level:

      # Extract log level for non-JSON logs from stderr
      - match:
          selector: '{stream="stderr"}'
          stages:
            - regex:
                expression: '^(?P<level>ERROR|WARNING|INFO|DEBUG)'
            - labels:
                level:

      # Default level to 'info' if not extracted
      - template:
          source: level
          template: '{{ if .level }}{{ .level | ToLower }}{{ else }}info{{ end }}'

      # Add level as label
      - labels:
          level:

      # Drop health check logs (too noisy)
      - drop:
          expression: '.*GET /health.*'

      # Drop metrics endpoint logs
      - drop:
          expression: '.*GET /metrics.*'
