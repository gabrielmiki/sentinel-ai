server {
    listen 80;
    server_name _;

    # Security headers (The always keyword means the header is added regardless of response status code — including error responses like 4xx/5xx)
    ## Prevents your site from being embedded in an <iframe> on other domains. 
    ## Blocks clickjacking attacks where attackers overlay your UI invisibly.
    add_header X-Frame-Options "SAMEORIGIN" always;
    ## Forces the browser to respect the declared Content-Type instead of guessing it. 
    ## Prevents attacks where a malicious file (e.g. disguised as an image) gets executed as JavaScript.
    add_header X-Content-Type-Options "nosniff" always;
    ## Enables the browser's built-in XSS filter. 
    ## If a reflected XSS attack is detected, it blocks the page from rendering entirely rather than sanitizing it.
    add_header X-XSS-Protection "1; mode=block" always;
    ## Controls how much URL information is sent in the Referer header when navigating away. 
    ## This value sends the full URL on same-protocol requests (HTTPS→HTTPS) but sends nothing on HTTPS→HTTP, preventing sensitive URL data from leaking over unencrypted connections.
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Backend service URL (variable forces runtime DNS resolution)
    set $backend_upstream http://backend:8000;

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # Metrics endpoint (Prometheus)
    location /metrics {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # API endpoints with rate limiting
    location /api/ {
        # enforces the rate limit defined in api_limit zone, 
        # allows bursts of 20 extra requests, nodelay processes burst requests immediately rather than queuing them
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        # enables WebSocket support on this endpoin
        proxy_set_header Connection "upgrade";
        # preserves the original hostname so the backend knows which domain was requested
        proxy_set_header Host $host;
        # passes the real client IP instead of nginx's internal IP
        proxy_set_header X-Real-IP $remote_addr;
        # appends client IP to the proxy chain header (useful when multiple proxies are involved)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # ells the backend whether the original request was HTTP or HTTPS
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # SSE streaming endpoints (no buffering)
    location /stream/ {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE specific settings
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # Docs
    location /docs {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Root
    location / {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
